<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Survivor Drive favicon: the last car on Earth driving down the road into the
    dying "Rust"-act sun. Colors and the "last-driver-toward-the-sunset" read are
    pulled straight from src/render/palette.ts. Bold silhouettes only, so it still
    reads at 16px: dark sky, sun disc, receding road, one chunky car.
  -->
  <defs>
    <!-- Sky: act zenith fading down into the sick orange haze. -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0a09"/>
      <stop offset="1" stop-color="#53301a"/>
    </linearGradient>
    <!-- The dying sun, low on the road ahead — mood, not light. -->
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2c486"/>
      <stop offset="0.55" stop-color="#e0934a"/>
      <stop offset="1" stop-color="#b8602c"/>
    </radialGradient>
    <clipPath id="round"><circle cx="32" cy="32" r="31"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="url(#sky)"/>

    <!-- Dying sun disc on the horizon. -->
    <circle cx="32" cy="30" r="13" fill="url(#sun)"/>

    <!-- Wasteland floor the road sits on. -->
    <rect y="36" width="64" height="28" fill="#39281a"/>

    <!-- The road receding to the horizon vanishing point. -->
    <polygon points="32,30 25,64 39,64" fill="#26282c"/>
    <!-- Dashed lane line down the centre. -->
    <polygon points="31.4,46 32.6,46 33.2,64 30.8,64" fill="#c7b26a"/>

    <!-- The survivor car, chunky silhouette in brand automotive red,
         driving away toward the sun. Roof, body, then dark wheels. -->
    <path d="M27 55 l2.5 -4 h5 l2.5 4 z" fill="#7f2d1e"/>
    <rect x="25" y="55" width="14" height="5.5" rx="1.3" fill="#be4632"/>
    <!-- Twin tail lamps — the read of a car going away from you. -->
    <rect x="26.5" y="56.2" width="2.4" height="2.2" rx="0.6" fill="#dd2a14"/>
    <rect x="35.1" y="56.2" width="2.4" height="2.2" rx="0.6" fill="#dd2a14"/>
    <rect x="24.5" y="59.5" width="4" height="3" rx="1.2" fill="#131316"/>
    <rect x="35.5" y="59.5" width="4" height="3" rx="1.2" fill="#131316"/>
  </g>

  <!-- Subtle rim so the icon sits cleanly on dark and light browser chrome. -->
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#14151a" stroke-width="2"/>
</svg>
